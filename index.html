<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сплав по Медведице</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Кнопка гамбургера для мобилок, если меню полностью скрыто -->
    <button id="mobile-menu-btn" class="mobile-open-btn">☰ Меню</button>

    <!-- Боковая панель (на мобилках станет нижней шторкой) -->
    <div id="sidebar">
        <div class="sidebar-header">
            <div>
                <h1>Река Медведица</h1>
                <p class="subtitle">Водное путешествие</p>
            </div>
            <button id="close-sidebar" class="close-btn">✕</button>
        </div>
        
        <div class="stat-box">
            <strong>Дистанция сплава:</strong> <span id="total-dist">0.0</span> км
        </div>

        <div id="photo-gallery">
            <h3>Панорамы маршрута</h3>
            <div id="thumbnails"></div>
        </div>
    </div>

    <!-- Карта -->
    <div id="map"></div>

    <!-- Скрипты-зависимости -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>
    
    <!-- Основная логика -->
    <script src="app.js"></script>
</body>
</html>
