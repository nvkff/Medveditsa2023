<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сплав по Медведице</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Pannellum CSS (360-просмотрщик) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <button id="mobile-menu-btn" class="mobile-open-btn">☰ Меню</button>

    <div id="sidebar" class="hidden">
        <div class="sidebar-header">
            <div>
                <h1>Река Медведица</h1>
                <p class="subtitle">Водное путешествие</p>
            </div>
            <button id="close-sidebar" class="close-btn">X</button>
        </div>
        
        <div class="stat-box">
            <strong>Дистанция сплава:</strong> <span id="total-dist">0.0</span> км
        </div>

        <div id="photo-gallery">
            <h3>Панорамы маршрута</h3>
            <div id="thumbnails"></div>
        </div>
    </div>

    <div id="map"></div>

    <!-- Модальное окно для СФЕРИЧЕСКОГО просмотра (Pannellum) -->
    <div id="photo-viewer" class="viewer-overlay">
        <span class="viewer-close">&times;</span>
        <div id="panorama-360"></div> <!-- Сюда встроится плеер панорам -->
        <div id="viewer-caption"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <!-- Pannellum JS -->
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
